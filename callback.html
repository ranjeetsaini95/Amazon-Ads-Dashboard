<!DOCTYPE html>
<html>

<head>
  <title>Amazon Connection</title>
</head>

<body>

<h2>Connecting Amazon Account...</h2>

<div id="status">Processing...</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js"

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const params = new URLSearchParams(window.location.search)
const code = params.get("code")

const statusDiv = document.getElementById("status")

if (!code) {
  statusDiv.innerHTML = "Amazon connection failed."
} else {

  try {

    const { data: { session } } = await supabase.auth.getSession()

    const response = await fetch(
      "https://amazon-ads-dashboard-xi.vercel.app/exchange-token",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          code: code,
          user_id: session.user.id
        })
      }
    )

    const result = await response.json()

    console.log("API response:", result)

    if (result.error) {
      statusDiv.innerHTML = "Error: " + JSON.stringify(result.error)
    } else {
      window.location.href = "profiles.html"
    }

  } catch (error) {

    console.error(error)

    statusDiv.innerHTML = "Amazon connection failed."

  }

}

</script>

</body>
</html>
