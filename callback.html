<!DOCTYPE html>
<html>

<head>
<title>Amazon Connection</title>
</head>

<body>

<h2>Connecting Amazon Account...</h2>

<div id="status">Waiting for authorization...</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js"

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const params = new URLSearchParams(window.location.search)
const code = params.get("code")

const statusDiv = document.getElementById("status")

if(!code){

  statusDiv.innerHTML = "Amazon connection failed."

}else{

  console.log("Authorization code:", code)

  statusDiv.innerHTML = "Saving authorization..."

  const { data: { session } } = await supabase.auth.getSession()

  if(!session){
    statusDiv.innerHTML = "User session not found."
    throw new Error("No user session")
  }

  await supabase
    .from("amazon_auth_codes")
    .insert({
      user_id: session.user.id,
      auth_code: code
    })

  statusDiv.innerHTML = "Authorization saved. Starting token exchange..."

  /*
  Trigger GitHub Action worker
  */

const response = await fetch(
  "https://api.github.com/repos/ranjeetsaini95/amazon-ads-dashboard/actions/workflows/exchange_token.yml/dispatches",
  {
    method: "POST",
    headers: {
      "Authorization": "token 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",
      "Accept": "application/vnd.github+json"
    },
    body: JSON.stringify({
      ref: "main"
    })
  }
)

console.log("GitHub response:", response.status)

  statusDiv.innerHTML = "Token exchange started. You can return to the dashboard."

}

</script>

</body>
</html>
