<!DOCTYPE html>
<html>

<head>
<title>Amazon Connection</title>
</head>

<body>

<h2>Connecting Amazon Account...</h2>

<div id="status"></div>

<script>

const params = new URLSearchParams(window.location.search)
const code = params.get("code")

const statusDiv = document.getElementById("status")

if(!code){

  statusDiv.innerHTML = "Amazon connection failed."

}else{

  console.log("Authorization code:", code)

  statusDiv.innerHTML = "Authorization received. Connecting..."

  // Send code to backend
  fetch("https://YOUR_BACKEND_URL/exchange-token", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      code: code
    })

  })
  .then(res => res.json())
  .then(data => {

    console.log("Token exchange response:", data)

    statusDiv.innerHTML =
      "Amazon account connected successfully."

  })
  .catch(err => {

    console.error(err)

    statusDiv.innerHTML =
      "Error connecting Amazon account."

  })

}

</script>

</body>
</html>
