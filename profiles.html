<!DOCTYPE html>
<html>

<head>
<title>Select Amazon Profiles</title>
<link rel="icon" href="data:,">
</head>

<body>

<h2>Select Amazon Profiles</h2>

<div id="profiles"></div>

<br>

<button id="activate">Activate Selected Profiles</button>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js"

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

async function loadProfiles() {

  // 1️⃣ Get session
  const { data: { session } } = await supabase.auth.getSession()

  if (!session) {
    alert("Please login again")
    window.location.href = "index.html"
    return
  }

  console.log("SESSION USER:", session.user.id)

  // 2️⃣ Find client
  const { data: clientData, error: clientError } = await supabase
    .from("clients")
    .select("id")
    .eq("user_id", session.user.id)

  console.log("CLIENT QUERY RESULT:", clientData)
  console.log("CLIENT QUERY ERROR:", clientError)

  if (!clientData || clientData.length === 0) {
    alert("Client not found")
    return
  }

  const client_id = clientData[0].id

  // 3️⃣ Load Amazon profiles
  const { data: profileData, error: profileError } = await supabase
    .from("amazon_profiles")
    .select("*")
    .eq("client_id", client_id)

  console.log("PROFILES:", profileData)
  console.log("PROFILE ERROR:", profileError)

  const container = document.getElementById("profiles")

  if (!profileData || profileData.length === 0) {
    container.innerHTML = "<p>No profiles found</p>"
    return
  }

  profileData.forEach(profile => {

    const div = document.createElement("div")

    div.innerHTML = `
      <label>
        <input type="checkbox" value="${profile.profile_id}">
        ${profile.account_name} (${profile.country_code})
      </label>
    `

    container.appendChild(div)

  })

  // 4️⃣ Activate profiles button
  document.getElementById("activate").addEventListener("click", async () => {

    const checked = document.querySelectorAll("input:checked")

    if (checked.length === 0) {
      alert("Please select at least one profile")
      return
    }

    // deactivate previous selections
    await supabase
      .from("amazon_profiles")
      .update({ is_active: false })
      .eq("client_id", client_id)

    // activate selected
    for (const box of checked) {

      await supabase
        .from("amazon_profiles")
        .update({ is_active: true })
        .eq("profile_id", box.value)

    }

    alert("Profiles activated successfully")

    window.location.href = "dashboard.html"

  })

}

// run page
loadProfiles()

</script>

</body>
</html>
