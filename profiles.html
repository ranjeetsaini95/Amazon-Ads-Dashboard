<!DOCTYPE html>
<html>
<head>
<title>Select Amazon Profiles</title>
</head>

<body>

<h2>Select Amazon Profiles</h2>

<div id="profiles"></div>

<br>

<button id="activate">Activate Selected Profiles</button>
console.log("SESSION USER:", session.user.id)
<script type="module">
<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js"

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// 1️⃣ get session FIRST
const { data: { session } } = await supabase.auth.getSession()

if (!session) {
  alert("You are not logged in")
  window.location.href = "index.html"
}

// 2️⃣ now you can use session
console.log("SESSION USER:", session.user.id)

// 3️⃣ find client
const { data: clientData } = await supabase
  .from("clients")
  .select("id")
  .eq("user_id", session.user.id)

if (!clientData || clientData.length === 0) {
  alert("Client not found")
  throw new Error("Client not found")
}

const client_id = clientData[0].id

// 4️⃣ load profiles
const { data: profiles } = await supabase
  .from("amazon_profiles")
  .select("*")
  .eq("client_id", client_id)

const container = document.getElementById("profiles")

profiles.forEach(profile => {

  const div = document.createElement("div")

  div.innerHTML = `
    <label>
      <input type="checkbox" value="${profile.profile_id}">
      ${profile.account_name} (${profile.country_code})
    </label>
  `

  container.appendChild(div)

})

// 5️⃣ activate profiles
document.getElementById("activate").onclick = async () => {

  const checked = document.querySelectorAll("input:checked")

  if (checked.length === 0) {
    alert("Please select at least one profile")
    return
  }

  await supabase
    .from("amazon_profiles")
    .update({ is_active: false })
    .eq("client_id", client_id)

  for (const box of checked) {

    await supabase
      .from("amazon_profiles")
      .update({ is_active: true })
      .eq("profile_id", box.value)

  }

  alert("Profiles activated!")

  window.location.href = "dashboard.html"

}

</script>
</body>
</html>
