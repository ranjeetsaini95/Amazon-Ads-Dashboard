<!DOCTYPE html>
<html>

<head>
<title>Select Amazon Profiles</title>
<link rel="icon" href="data:,">
</head>

<body>

<h2>Select Amazon Profiles</h2>

<div id="profiles"></div>

<br>

<button id="activate">Activate Selected Profiles</button>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js"

console.log("🚀 Initializing Supabase")

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

async function loadProfiles() {

  console.log("🔎 Fetching session")

  const { data: { session }, error: sessionError } = await supabase.auth.getSession()

  console.log("SESSION:", session)
  console.error("SESSION ERROR:", sessionError)

  if (!session) {
    alert("Please login again")
    window.location.href = "index.html"
    return
  }

  console.log("SESSION USER:", session.user.id)

  // -----------------------
  // Fetch client
  // -----------------------

  console.log("🔎 Fetching client")

  const { data: clientData, error: clientError } = await supabase
    .from("clients")
    .select("id")
    .eq("user_id", session.user.id)

  console.log("CLIENT DATA:", clientData)
  console.error("CLIENT ERROR:", clientError)

  if (!clientData || clientData.length === 0) {
    alert("Client not found")
    return
  }

  const client_id = clientData[0].id

  console.log("CLIENT ID:", client_id)

  // -----------------------
  // Fetch profiles
  // -----------------------

  console.log("🔎 Fetching Amazon profiles")

  const { data: profiles, error: profileError } = await supabase
    .from("amazon_profiles")
    .select("*")
    .eq("client_id", client_id)

  console.log("PROFILES:", profiles)
  console.error("PROFILE ERROR:", profileError)

  const container = document.getElementById("profiles")

  if (!profiles || profiles.length === 0) {
    console.warn("⚠️ No profiles returned")
    container.innerHTML = "<p>No profiles found</p>"
    return
  }

  profiles.forEach(profile => {

    console.log("Rendering profile:", profile)

    const div = document.createElement("div")

    div.innerHTML = `
      <label>
        <input type="checkbox" value="${profile.profile_id}">
        ${profile.account_name} (${profile.country_code})
      </label>
    `

    container.appendChild(div)

  })

  // -----------------------
  // Activate profiles
  // -----------------------

  document.getElementById("activate").addEventListener("click", async () => {

    console.log("Activate button clicked")

    const checked = document.querySelectorAll("input:checked")

    console.log("SELECTED CHECKBOXES:", checked)

    if (checked.length === 0) {
      alert("Please select at least one profile")
      return
    }

    console.log("Resetting all profiles")

    const { error: resetError } = await supabase
      .from("amazon_profiles")
      .update({ is_active: false })
      .eq("client_id", client_id)

    console.error("RESET ERROR:", resetError)

    for (const box of checked) {

      console.log("Activating profile:", box.value)

      const { data, error } = await supabase
        .from("amazon_profiles")
        .update({ is_active: true })
        .eq("profile_id", box.value)

      console.log("UPDATE RESULT:", data)
      console.error("UPDATE ERROR:", error)

    }

    console.log("Profiles activation complete")

    alert("Profiles activated successfully")

    window.location.href = "dashboard.html"

  })

}

loadProfiles()

</script>

</body>
</html>
