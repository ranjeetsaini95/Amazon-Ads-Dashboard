<!DOCTYPE html>
<html>

<head>

<title>Amazon Ads Dashboard</title>

<link rel="icon" href="data:,">

<link rel="stylesheet" href="./css/dashboard.css">

</head>

<body>

<div class="topbar">

<div>

<select id="accountSwitcher" class="account-switcher"></select>

</div>

<div>

<input type="date" id="startDate">

<input type="date" id="endDate">

<button id="refreshBtn">Refresh</button>

</div>

</div>

<div class="container">

<div class="kpi-grid">

<div class="kpi-card">
<div>Sales</div>
<div id="sales" class="kpi-value">$0</div>
</div>

<div class="kpi-card">
<div>Spend</div>
<div id="spend" class="kpi-value">$0</div>
</div>

<div class="kpi-card">
<div>ACOS</div>
<div id="acos" class="kpi-value">0%</div>
</div>

<div class="kpi-card">
<div>TACOS</div>
<div id="tacos" class="kpi-value">0%</div>
</div>

</div>

<div class="chart">

<h3>Performance Chart</h3>

<div id="chartArea">Chart will load here</div>

</div>

</div>

<script type="module" src="./js/dashboard.js"></script>

</body>
</html>
