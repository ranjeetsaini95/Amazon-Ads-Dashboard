<!DOCTYPE html>
<html>

<head>

<title>Ads Analytics Dashboard</title>

<link rel="icon" href="data:,">

<link rel="stylesheet" href="./css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- TOP BAR -->

<div class="topbar">

<div class="left">

<h2 class="logo">Ads Analytics</h2>

<select id="accountSwitcher"></select>

</div>

<div class="right">

<select id="datePreset">

<option value="today">Today</option>
<option value="yesterday">Yesterday</option>
<option value="7">Last 7 Days</option>
<option value="30" selected>Last 30 Days</option>

</select>

<input type="date" id="startDate">
<input type="date" id="endDate">

<button id="refreshBtn">Refresh</button>

</div>

</div>


<div class="container">

<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="kpi-card">
<div class="kpi-title">Sales</div>
<div id="sales" class="kpi-value">$0</div>
</div>

<div class="kpi-card">
<div class="kpi-title">Spend</div>
<div id="spend" class="kpi-value">$0</div>
</div>

<div class="kpi-card">
<div class="kpi-title">Orders</div>
<div id="orders" class="kpi-value">0</div>
</div>

<div class="kpi-card">
<div class="kpi-title">ACOS</div>
<div id="acos" class="kpi-value">0%</div>
</div>

<div class="kpi-card">
<div class="kpi-title">TACOS</div>
<div id="tacos" class="kpi-value">0%</div>
</div>

<div class="kpi-card">
<div class="kpi-title">Clicks</div>
<div id="clicks" class="kpi-value">0</div>
</div>

</div>


<!-- PERFORMANCE CHART -->

<div class="chart-card">

<h3>Performance</h3>

<canvas id="performanceChart"></canvas>

</div>


<!-- CAMPAIGN TABLE -->

<div class="table-card">

<h3>Campaign Performance</h3>

<table id="campaignTable">

<thead>

<tr>

<th>Campaign</th>
<th>Spend</th>
<th>Sales</th>
<th>ACOS</th>
<th>Clicks</th>
<th>Orders</th>

</tr>

</thead>

<tbody>

<tr>
<td colspan="6">No data yet</td>
</tr>

</tbody>

</table>

</div>

</div>


<script type="module" src="./js/dashboard.js"></script>

</body>
</html>
